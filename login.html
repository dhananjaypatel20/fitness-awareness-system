<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FitSense | Auth</title>
  <link rel="stylesheet" href="login.css" />
  <style>
    .hidden { display: none; }
    .toggle-link {
      margin-top: 15px;
      color: #2563eb;
      cursor: pointer;
      font-size: 14px;
      text-decoration: underline;
    }
    .toggle-link:hover {
      text-decoration: none;
    }
    .message {
      margin-top: 10px;
      font-size: 14px;
      color: red;
      font-weight: 600;
      text-align: center;
    }
    .success {
      color: green;
    }
  </style>
</head>
<body>

<div class="container" id="login-container">
  <h2>Login to FitSense Awareness System💪</h2>

  <form onsubmit="handleLogin(event)">
    <input type="tel" id="login-mobile" placeholder="Mobile Number" required>
    <input type="password" id="login-password" placeholder="Password" required>
    <button type="submit">Login</button>
  </form>
  <div class="message" id="login-msg"></div>
  <div class="toggle-link" onclick="toggleAuth()">Don't have an account? Sign Up</div>
</div>

<div class="container hidden" id="signup-container">
  <h2>Sign Up for FitSense Awareness System💪</h2>

  <form onsubmit="handleSignup(event)">
    <input type="text" id="signup-name" placeholder="Your Name" required>
    <input type="tel" id="signup-mobile" placeholder="Mobile Number" required>
    <input type="email" id="signup-email" placeholder="Email (optional)">
    <input type="password" id="signup-password" placeholder="Password" required>
    <button type="submit">Sign Up</button>
  </form>
  <div class="message" id="signup-msg"></div>
  <div class="toggle-link" onclick="toggleAuth()">Already have an account? Login</div>
</div>

<script src="login.js"></script>
</body>
</html>
