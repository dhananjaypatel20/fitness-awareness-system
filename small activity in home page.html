<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FitLife AI | Health Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff88;
            --warning: #ffaa00;
            --danger: #ff0055;
            --critical: #ff0000;
            --bg: #020617;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--bg);
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: 0.3s;
        }

        /* Emergency Flashing Effect */
        @keyframes emergency-flash {
            0% { background: #020617; }
            50% { background: #ff0000; }
            100% { background: #020617; }
        }
        .emergency-mode { animation: emergency-flash 0.2s infinite; }

        .glow-sphere {
            position: absolute;
            width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(0,255,136,0.1) 0%, transparent 70%);
            border-radius: 50%;
            filter: blur(80px);
            animation: move 6s infinite alternate;
        }
        @keyframes move { from { transform: translate(-20%, -20%); } to { transform: translate(20%, 20%); } }

        .card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 30px;
            width: 350px;
            text-align: center;
            z-index: 10;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        @keyframes shake {
            0% { transform: translate(2px, 2px); }
            25% { transform: translate(-2px, -2px); }
            50% { transform: translate(2px, -2px); }
            75% { transform: translate(-2px, 2px); }
            100% { transform: translate(0, 0); }
        }
        .sensor-active { animation: shake 0.1s infinite; }

        h2 { font-size: 1.5rem; margin-bottom: 25px; color: #fff; }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            color: white;
            outline: none;
        }

        .btn-analyze {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            background: linear-gradient(90deg, #00ff88, #00bd65);
            border: none;
            border-radius: 15px;
            color: #000;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
        }

        #popup {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(0.5);
            width: 360px;
            background: #0f172a;
            border-radius: 40px;
            padding: 35px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.9);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #popup.show {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            visibility: visible;
        }

        .icon-container {
            width: 100px; height: 100px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem;
            margin-bottom: 20px;
        }

        .btn-done {
            background: #fff; color: #000; padding: 12px 50px;
            border-radius: 50px; font-weight: 700; border: none; cursor: pointer;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="glow-sphere"></div>

    <div class="card" id="mainCard">
        <h2>🚀 Health Sync</h2>
        <input type="text" id="name" placeholder="Full Name">
        <input type="number" id="weight" placeholder="Weight (kg)">
        <input type="number" id="height" placeholder="Height (cm)">
        <button class="btn-analyze" onclick="analyze()">Check Health</button>
    </div>

    <div id="popup">
        <div class="icon-container" id="icon">🧘</div>
        <h3 id="status-title">RESULT</h3>
        <p id="message-text"></p>
        <button class="btn-done" onclick="hide()">GOT IT</button>
    </div>

    <script>
        let alarmInterval;

        function playEmergencyAlarm() {
            const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
            audio.playbackRate = 4.5;
            
            alarmInterval = setInterval(() => {
                audio.currentTime = 0;
                audio.play();
            }, 100); 
            
            document.body.classList.add('emergency-mode');
            document.getElementById('mainCard').classList.add('sensor-active');
        }

        function playNormalSound() {
            const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3');
            audio.playbackRate = 1.5;
            audio.play();
        }

        function analyze() {
            const name = document.getElementById('name').value;
            const w = parseFloat(document.getElementById('weight').value);
            const h = document.getElementById('height').value;

            if(!name || !w || !h) return alert("Please enter all details!");

            const pop = document.getElementById('popup');
            const icon = document.getElementById('icon');
            const title = document.getElementById('status-title');
            const msg = document.getElementById('message-text');

            pop.classList.add('show');

            if (w < 40) {
                playNormalSound();
                icon.innerText = "🚨";
                pop.style.border = "3px solid #ff0055";
                title.innerText = "NOT FIT";
                title.style.color = "#ff0055";
                // Updated message for under 40kg
                msg.innerHTML = `Attention <b>${name}</b>! NOT FIT. Your weight is very low. Eat healthy food and gain the weight.`;
            } 
            else if (w <= 70) {
                playNormalSound();
                icon.innerText = "👑";
                pop.style.border = "3px solid #00ff88";
                title.innerText = "EXCELLENT";
                title.style.color = "#00ff88";
                msg.innerHTML = `Great job <b>${name}</b>! You are in excellent condition.`;
            } 
            else if (w <= 85) {
                playNormalSound();
                icon.innerText = "⚖️";
                pop.style.border = "3px solid #ffaa00";
                title.innerText = "WEIGHT LOSS NEEDED";
                title.style.color = "#ffaa00";
                msg.innerHTML = `Hello <b>${name}</b>. You need to focus on weight loss.`;
            } 
            else {
                playEmergencyAlarm();
                icon.innerText = "☢️";
                pop.style.border = "5px solid #ff0000";
                title.innerText = "DANGER ALERT";
                title.style.color = "#ff0000";
                msg.innerHTML = `<span style="color: #ff0000; font-weight: 800;">ALERT ${name}!</span><br>Your weight is not good for your health. <br><b>YOU ARE NOT FIT!</b>`;
            }
        }

        function hide() {
            document.getElementById('popup').classList.remove('show');
            document.body.classList.remove('emergency-mode');
            document.getElementById('mainCard').classList.remove('sensor-active');
            clearInterval(alarmInterval);
        }
    </script>
</body>
</html>
